services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      COLONYMIND_SEED: ${COLONYMIND_SEED:-20260718}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-https://openaidev.automationfreelancer.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-sol}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-medium}
      OPENAI_AUDIT_REASONING_EFFORT: ${OPENAI_AUDIT_REASONING_EFFORT:-low}
      OPENAI_AUDIT_TIMEOUT_SECONDS: ${OPENAI_AUDIT_TIMEOUT_SECONDS:-120}
      OPENAI_AUDIT_MAX_OUTPUT_TOKENS: ${OPENAI_AUDIT_MAX_OUTPUT_TOKENS:-3000}
      OPENAI_AUDIT_MAX_CALLS_PER_HOUR: ${OPENAI_AUDIT_MAX_CALLS_PER_HOUR:-24}
      OPENAI_AUDIT_SESSION_COOLDOWN_SECONDS: ${OPENAI_AUDIT_SESSION_COOLDOWN_SECONDS:-20}
      OPENAI_AUDIT_MAX_CONCURRENT_CALLS: ${OPENAI_AUDIT_MAX_CONCURRENT_CALLS:-2}
      DATABASE_URL: ${DATABASE_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      EXPERIMENT_ADMIN_EMAILS: ${EXPERIMENT_ADMIN_EMAILS:-}
    expose:
      - "8201"
    volumes:
      - /var/run/postgresql:/var/run/postgresql
    mem_limit: 320m
    cpus: "0.50"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${COLONYMIND_PORT:-8200}:8080"
    mem_limit: 160m
    cpus: "0.25"
