services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      COLONYMIND_SEED: ${COLONYMIND_SEED:-20260718}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.6-sol}
      OPENAI_REASONING_EFFORT: ${OPENAI_REASONING_EFFORT:-medium}
      DATABASE_URL: ${DATABASE_URL:-}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET:-}
      EXPERIMENT_ADMIN_EMAILS: ${EXPERIMENT_ADMIN_EMAILS:-}
    expose:
      - "8201"
    volumes:
      - /var/run/postgresql:/var/run/postgresql
    mem_limit: 320m
    cpus: "0.50"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "127.0.0.1:${COLONYMIND_PORT:-8200}:8080"
    mem_limit: 160m
    cpus: "0.25"
